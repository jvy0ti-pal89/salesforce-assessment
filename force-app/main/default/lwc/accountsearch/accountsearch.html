<template>
    <lightning-card title="Account Search">

        <div class="slds-p-around_small">
            <lightning-input
                type="search"
                label="Search Accounts"
                onchange={handleSearch}>
            </lightning-input>
        </div>

        <template for:each={accounts} for:item="acc">
            <div key={acc.Id} class="slds-box slds-m-around_x-small">
                <p><b>Name:</b> {acc.Name}</p>
                <p><b>Industry:</b> {acc.Industry}</p>
                <p><b>Phone:</b> {acc.Phone}</p>
            </div>
        </template>

    </lightning-card>
</template>
