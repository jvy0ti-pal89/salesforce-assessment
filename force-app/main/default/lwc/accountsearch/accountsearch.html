<template>
    <lightning-card title="Account Search">

        <div class="slds-p-around_small">
            <lightning-input
                type="search"
                label="Search Accounts"
                placeholder="Type account name..."
                onkeyup={handleKeyUp}>
            </lightning-input>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>

        <template if:true={hasResults}>
            <lightning-datatable
                key-field="Id"
                data={accounts}
                columns={columns}
                hide-checkbox-column
                onrowaction={handleRowClick}>
            </lightning-datatable>
        </template>

        <template if:true={showEmpty}>
            <div class="slds-p-around_small slds-text-color_weak">
                No results found
            </div>
        </template>

    </lightning-card>
</template>
